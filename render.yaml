services:
  - type: web
    name: vocalbridge
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_SERVER_URL
        value: https://vocalbridge-sales-ai.onrender.com
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: voice-sales.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: voice-sales
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: voice-sales.firebasestorage.app
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: "418467568953"
      - key: VITE_FIREBASE_DATABASE_ID
        value: "(default)"
      # Set these as secrets in the Render dashboard (do NOT commit):
      # GEMINI_API_KEY
      # TWILIO_ACCOUNT_SID
      # TWILIO_AUTH_TOKEN
      # TWILIO_PHONE_NUMBER
      # VITE_FIREBASE_API_KEY
      # VITE_FIREBASE_APP_ID
