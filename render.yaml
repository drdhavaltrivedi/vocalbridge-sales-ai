services:
  - type: web
    name: vocalbridge
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      # Set the rest manually in the Render dashboard:
      # GEMINI_API_KEY
      # TWILIO_ACCOUNT_SID
      # TWILIO_AUTH_TOKEN
      # TWILIO_PHONE_NUMBER
      # PUBLIC_SERVER_URL  ← set to your Render URL after first deploy
      # VITE_FIREBASE_API_KEY
      # VITE_FIREBASE_AUTH_DOMAIN
      # VITE_FIREBASE_PROJECT_ID
      # VITE_FIREBASE_STORAGE_BUCKET
      # VITE_FIREBASE_MESSAGING_SENDER_ID
      # VITE_FIREBASE_APP_ID
      # VITE_FIREBASE_DATABASE_ID
